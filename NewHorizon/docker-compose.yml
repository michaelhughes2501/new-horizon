version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newhorizon-original-dev
    ports:
      - "8082:8081"
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./assets:/app/assets
      - /app/node_modules
    networks:
      - newhorizon-original

networks:
  newhorizon-original:
    driver: bridge
